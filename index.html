<!DOCTYPE html>
<html>
<head>
    <title>Plantilla Financiera</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .contenedor {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            margin: 10px 0;
        }

        .boton {
            display: block;
            margin-top: 20px;
            padding: 15px;
            font-size: 16px;
            color: white;
            background: linear-gradient(to right, #28a745, #218838);
            text-decoration: none;
            border-radius: 25px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="contenedor">
        <h1>💰 Plantilla Financiera</h1>
        <p>Controla tus ingresos y gastos fácilmente.</p>

        <a class="boton" href="https://docs.google.com/spreadsheets/d/1dd-0jWlcaxgW7tYWZSlFIK3s5YI_B8KeDvB0Cs7ByF4/copy" target="_blank">
            👉 Ingresa a la plantilla y crea una copia ♡ྀི
        </a>

        <div class="footer">
            Aurea Finanzas𝜗ৎ
        </div>
    </div>

</body>
</html>
